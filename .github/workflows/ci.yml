name: Auto Build and Custom Release

on:
  push:
    branches:
      - master

jobs:
  release:
    # 仅在 commit 信息包含 'release: v' 时触发
    if: "contains(github.event.head_commit.message, 'release: v')"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Publish New Version
        id: publish
        run: |
          echo "🚀 开始发布新版本到 NPM..."
          if npm publish; then
            echo "✅ 发布成功！"
          else
            echo "❌ ::error::NPM 发布失败！"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
